<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Survivor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020010; font-family: 'Noto Sans JP', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        .neon-text { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; font-family: 'Orbitron', sans-serif; }
        .btn-neon { background: transparent; color: #0ff; border: 2px solid #0ff; box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff; transition: all 0.2s; }
        .btn-neon:hover:not(:disabled) { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff; }
        .btn-neon:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #555; box-shadow: none; }
        .btn-neon-red { background: transparent; color: #f43f5e; border: 2px solid #f43f5e; box-shadow: 0 0 10px #f43f5e, inset 0 0 10px #f43f5e; transition: all 0.2s; }
        .btn-neon-red:hover { background: #f43f5e; color: #000; box-shadow: 0 0 20px #f43f5e, inset 0 0 20px #f43f5e; }
        
        .upgrade-card { background: rgba(0, 20, 40, 0.8); border: 1px solid #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); transition: transform 0.2s, box-shadow 0.2s; }
        .upgrade-card:hover { transform: translateY(-5px); box-shadow: 0 0 25px rgba(0, 255, 255, 0.7); cursor: pointer; }
        
        .cutin-base { animation: cutinFlash 3s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes cutinFlash { 0%{opacity:0;transform:scale(1.5) rotate(-5deg);filter:brightness(3);background-color:rgba(255,255,255,0.8)} 10%{opacity:1;transform:scale(1) rotate(0deg);filter:brightness(1.2);background-color:rgba(0,0,0,0.8);} 80%{opacity:1;transform:scale(1.05);filter:brightness(1);background-color:rgba(0,0,0,0.6)} 100%{opacity:0;transform:scale(1.1);filter:brightness(0);background-color:transparent} }
        
        .shatter-glass { animation: shatterAnim 1.5s ease-out forwards; pointer-events: none; z-index: 200; position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, #fff 21%, transparent 22%); background-size: 100px 100px; opacity: 0; }
        @keyframes shatterAnim { 0% { opacity: 1; transform: scale(1); filter: brightness(2); } 20% { opacity: 1; transform: scale(1.1) rotate(2deg); filter: contrast(2) drop-shadow(0 0 20px #fff); } 100% { opacity: 0; transform: scale(2) rotate(-5deg); filter: blur(10px); } }

        .lava-bg { position: absolute; inset: 0; background: radial-gradient(circle at center, #ff4500 0%, #8b0000 50%, #000 100%); mix-blend-mode: screen; opacity: 0; transition: opacity 2s; z-index: 0; pointer-events: none; }
        .lava-bg.active { opacity: 0.4; animation: lavaPulse 4s infinite alternate; }
        @keyframes lavaPulse { 0% { transform: scale(1); filter: hue-rotate(0deg); } 100% { transform: scale(1.05); filter: hue-rotate(15deg); } }

        input:checked ~ .bg-gray-600 { background-color: #06b6d4; }
        input:checked ~ .dot { transform: translateX(100%); }
        input[name="gameSpeed"]:checked + .speed-btn { background-color: #06b6d4 !important; color: #000 !important; box-shadow: 0 0 10px #06b6d4 !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0891b2; }

        .title-panel { background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-white">

    <div id="lavaOverlay" class="lava-bg"></div>
    <canvas id="gameCanvas" class="relative z-10"></canvas>
    <div id="shatterEffect" class="shatter-glass hidden"></div>

    <div id="joystickZone" class="fixed bottom-8 right-8 md:bottom-16 md:right-16 w-32 h-32 bg-gray-800/60 rounded-full border-2 border-cyan-500/50 touch-none z-[100] flex items-center justify-center hidden">
        <div id="joystickStick" class="w-12 h-12 bg-cyan-400/90 rounded-full shadow-[0_0_15px_cyan] pointer-events-none transform translate-x-0 translate-y-0"></div>
    </div>

    <!-- メインUIレイヤー -->
    <div id="uiLayer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-40 hidden">
        <div class="flex justify-between items-start">
            <div>
                <div class="text-2xl font-bold" style="font-family: 'Orbitron', sans-serif;">SCORE: <span id="scoreDisplay">0</span></div>
                <div class="text-lg text-gray-300 font-bold tracking-wider">TIME: <span id="timeDisplay">00:00</span></div>
                <div id="domainTimerContainer" class="text-xl font-bold text-red-500 hidden animate-pulse mt-2" style="text-shadow: 0 0 10px red;">DOMAIN: <span id="domainDisplay">45.0</span>s</div>
                <div id="onlinePlayersContainer" class="text-md text-cyan-300 font-bold hidden mt-1 bg-black/50 px-2 py-1 rounded">
                    🌐 PLAYERS: <span id="onlinePlayersDisplay">1</span>
                </div>
            </div>
            <div class="text-right flex flex-col items-end gap-2 pointer-events-auto">
                <button id="pauseBtn" class="btn-neon px-3 py-1 text-sm font-bold rounded cursor-pointer flex items-center justify-center gap-1">
                    <span class="text-xs">II</span> PAUSE
                </button>
                <div class="text-xl font-bold text-cyan-400">LV <span id="levelDisplay">1</span></div>
            </div>
        </div>
        
        <div id="bossHpContainer" class="absolute top-16 left-1/2 transform -translate-x-1/2 w-full max-w-xl hidden z-30">
            <div id="bossNameDisplay" class="text-center text-red-500 font-bold text-xl md:text-2xl mb-1 tracking-widest" style="text-shadow: 0 0 10px red;">BOSS</div>
            <div class="relative w-full h-4 bg-gray-900 rounded-sm border-2 border-red-800 overflow-hidden">
                <div id="bossHpBar" class="absolute top-0 left-0 h-full bg-red-600 shadow-[0_0_15px_red] transition-all duration-100" style="width: 100%;"></div>
            </div>
        </div>
        
        <div class="w-full max-w-2xl mx-auto mb-4">
            <div class="relative w-full h-3 bg-gray-800 rounded-full overflow-hidden border border-gray-600 mb-2">
                <div id="hpBar" class="absolute top-0 left-0 h-full bg-red-500 shadow-[0_0_10px_red] transition-all duration-200" style="width: 100%;"></div>
            </div>
            <div class="relative w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                <div id="expBar" class="absolute top-0 left-0 h-full bg-cyan-400 shadow-[0_0_10px_cyan] transition-all duration-200" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- ボス警告 -->
    <div id="bossWarning" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center z-40 hidden">
        <div class="bg-red-900/50 w-full py-8 border-y-4 border-red-600 flex justify-center items-center backdrop-blur-sm">
            <h2 id="warningText" class="text-6xl md:text-8xl font-bold text-red-500 tracking-[0.2em] animate-pulse text-center" style="text-shadow: 0 0 20px red; font-family: 'Orbitron', sans-serif;">WARNING</h2>
        </div>
    </div>

    <!-- ポーズ画面 -->
    <div id="pauseScreen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center backdrop-blur-md z-50 hidden">
        <h2 class="text-6xl font-bold mb-8 text-white tracking-widest neon-text" style="font-family: 'Orbitron', sans-serif;">PAUSED</h2>
        
        <div class="mb-6 bg-gray-900/80 p-5 rounded-lg border border-cyan-500/50 flex flex-col items-center gap-4 w-80">
            <span class="text-cyan-300 font-bold text-lg tracking-wider">SOUND</span>
            <button id="pauseMuteBtn" class="btn-neon px-6 py-2 w-full text-xl font-bold rounded cursor-pointer flex items-center justify-center gap-2">🔊 SOUND: ON</button>
        </div>

        <div class="mb-6 bg-gray-900/80 p-5 rounded-lg border border-cyan-500/50 flex flex-col items-center gap-4 w-80">
            <span class="text-cyan-300 font-bold text-lg tracking-wider">GAME SPEED (Solo Only)</span>
            <div class="flex justify-center gap-2 w-full">
                <label class="cursor-pointer flex-1"><input type="radio" name="gameSpeed" value="1.0" class="sr-only" onchange="window.setGameSpeed(1.0)" checked><div class="speed-btn px-2 py-2 border border-cyan-500 rounded text-cyan-500 hover:bg-cyan-500 hover:text-black transition text-center font-bold">x1.0</div></label>
                <label class="cursor-pointer flex-1"><input type="radio" name="gameSpeed" value="2.0" class="sr-only" onchange="window.setGameSpeed(2.0)"><div class="speed-btn px-2 py-2 border border-cyan-500 rounded text-cyan-500 hover:bg-cyan-500 hover:text-black transition text-center font-bold">x2.0</div></label>
                <label class="cursor-pointer flex-1"><input type="radio" name="gameSpeed" value="3.0" class="sr-only" onchange="window.setGameSpeed(3.0)"><div class="speed-btn px-2 py-2 border border-cyan-500 rounded text-cyan-500 hover:bg-cyan-500 hover:text-black transition text-center font-bold">x3.0</div></label>
            </div>
        </div>

        <div class="flex gap-4 mt-4">
            <button id="quitToTitleBtn" class="btn-neon-red px-6 py-3 text-lg font-bold rounded cursor-pointer">QUIT & SAVE</button>
            <button id="resumeBtn" class="btn-neon px-8 py-3 text-xl font-bold rounded cursor-pointer">RESUME</button>
        </div>
    </div>

    <!-- カットイン -->
    <div id="generalCutin" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center z-[60] hidden overflow-hidden">
        <div class="relative text-center z-[60] cutin-base w-full py-10" id="cutinBg">
            <h2 id="cutinTitle" class="text-7xl md:text-9xl font-bold text-white italic drop-shadow-[0_0_20px_#fff]" style="font-family: 'Noto Sans JP', serif;"></h2>
            <p id="cutinSub" class="text-5xl md:text-7xl mt-4 tracking-[0.5em] font-bold"></p>
        </div>
    </div>

    <!-- タイトル画面 (UI改善版) -->
    <div id="startScreen" class="absolute inset-0 flex flex-col items-center backdrop-blur-sm z-50 overflow-y-auto py-8 px-4" style="background: radial-gradient(circle at center, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%);">
        
        <h1 class="text-6xl md:text-8xl font-bold mb-4 neon-text tracking-wider text-center mt-2">NEON<br>SURVIVOR</h1>
        
        <div class="title-panel p-6 rounded-2xl w-full max-w-md flex flex-col items-center gap-5 mb-6">
            <div class="w-full flex justify-between items-center bg-black/50 p-3 rounded-lg border border-gray-700">
                <span class="text-gray-400 font-bold text-sm">自己ベスト</span>
                <span class="text-yellow-400 font-bold text-xl drop-shadow-[0_0_5px_yellow]"><span id="currentBestDisplay">0</span> SCORE</span>
            </div>

            <div class="w-full">
                <label class="block text-cyan-300 font-bold text-sm tracking-wider mb-2 ml-1">プレイヤー名 (必須)</label>
                <input type="text" id="nicknameInput" placeholder="Enter Nickname" maxlength="10" class="w-full px-4 py-3 bg-black/80 border-2 border-cyan-600 rounded-lg text-white text-center text-xl font-bold outline-none focus:border-cyan-300 focus:shadow-[0_0_15px_cyan] transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4 w-full mt-2">
                <button id="startBtn" class="btn-neon py-4 text-xl font-bold rounded-lg cursor-pointer flex flex-col items-center justify-center">
                    SOLO
                    <span class="text-xs font-normal mt-1">通常サバイバル</span>
                </button>
                <button id="onlineStartBtn" class="btn-neon-red py-4 text-xl font-bold rounded-lg cursor-pointer flex flex-col items-center justify-center shadow-[0_0_15px_#f43f5e]">
                    ONLINE
                    <span class="text-xs font-normal text-white mt-1">マルチ共闘</span>
                </button>
            </div>
        </div>

        <button id="openUpgradeBtn" class="bg-gray-800 text-yellow-400 border-2 border-yellow-500 shadow-[0_0_10px_yellow] hover:bg-yellow-500 hover:text-black hover:shadow-[0_0_20px_yellow] px-12 py-3 text-xl font-bold rounded-full cursor-pointer transition-all mb-6">
            UPGRADE (強化)
        </button>

        <div class="title-panel p-4 rounded-xl w-full max-w-md flex flex-col gap-4 mb-4">
            <div class="flex items-center justify-between">
                <span class="text-cyan-300 font-bold text-sm">画面ジョイスティック</span>
                <label class="flex items-center cursor-pointer">
                    <div class="relative">
                        <input type="checkbox" id="joystickToggle" class="sr-only" checked onchange="window.toggleJoystickFromPause(this.checked)">
                        <div class="block bg-gray-600 w-12 h-7 rounded-full transition-colors duration-300"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-300 shadow"></div>
                    </div>
                </label>
            </div>
            <div class="h-px w-full bg-gray-700"></div>
            <div class="flex gap-2 w-full">
                <button id="exportBtn" class="flex-1 bg-blue-900/50 border border-blue-500 text-blue-200 py-2 rounded hover:bg-blue-700 text-sm font-bold transition">セーブコード発行</button>
                <button id="importBtn" class="flex-1 bg-green-900/50 border border-green-500 text-green-200 py-2 rounded hover:bg-green-700 text-sm font-bold transition">コードで復元</button>
            </div>
        </div>
    </div>

    <!-- アップグレード画面 -->
    <div id="upgradeScreen" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center backdrop-blur-md z-[60] hidden py-10">
        <h2 class="text-4xl md:text-5xl font-bold mb-2 text-yellow-300 shadow-[0_0_15px_yellow] text-center" style="font-family: 'Orbitron', sans-serif;">PERMANENT UPGRADES</h2>
        <p class="text-xl md:text-2xl text-white mb-6 font-bold">COINS: <span id="metaCoinsDisplay" class="text-yellow-400 text-3xl">0</span></p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 w-full max-w-4xl px-4 overflow-y-auto max-h-[60vh] pb-4" id="upgradeListContainer"></div>
        <button id="closeUpgradeBtn" class="btn-neon mt-6 px-8 py-3 text-xl font-bold rounded cursor-pointer">BACK TO MENU</button>
    </div>

    <!-- レベルアップ画面 -->
    <div id="levelUpScreen" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center backdrop-blur-md z-50 hidden">
        <h2 class="text-5xl font-bold mb-8 text-yellow-300 shadow-[0_0_15px_yellow] animate-pulse" style="font-family: 'Orbitron', sans-serif;">LEVEL UP!</h2>
        <p class="mb-6 text-2xl font-bold text-white">スキルを1つ選んでください</p>
        <div id="upgradesContainer" class="flex flex-wrap justify-center gap-6 max-w-4xl px-4"></div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="gameOverScreen" class="absolute inset-0 bg-red-950/90 flex flex-col items-center justify-center backdrop-blur-md z-50 hidden py-10 overflow-y-auto">
        <h2 class="text-6xl font-bold mb-2 text-white shadow-[0_0_20px_red]">GAME OVER</h2>
        <p class="text-2xl mb-4 font-bold text-white">生存時間: <span id="finalTime" class="text-cyan-300"></span></p>
        <div class="bg-black/60 p-6 rounded-lg border-2 border-red-500 mb-8 flex flex-col items-center w-full max-w-md mx-4">
            <p class="text-xl mb-2 text-gray-300 font-bold">今回のスコア</p>
            <p class="text-5xl font-bold text-yellow-300 mb-6 drop-shadow-[0_0_10px_yellow]" id="finalScore" style="font-family: 'Orbitron', sans-serif;">0</p>
            <div class="w-full h-px bg-gray-600 mb-6"></div>
            <p class="text-sm text-gray-400 font-bold">自己ベスト</p>
            <p class="text-2xl font-bold text-cyan-400 mb-2" id="bestScore" style="font-family: 'Orbitron', sans-serif;">0</p>
            <p class="text-lg text-yellow-200 font-bold">獲得コイン: <span id="earnedCoinsDisplay" class="text-2xl text-yellow-400">+0</span></p>
            <p id="newRecordText" class="text-yellow-400 font-bold mt-2 animate-bounce hidden text-xl">★ NEW RECORD ★</p>
        </div>
        <button id="restartBtn" class="btn-neon px-10 py-4 text-2xl font-bold rounded cursor-pointer">TITLE MENU</button>
    </div>

    <script type="module">
        // ==========================================
        // Firebase & Global Setup
        // ==========================================
        let fbDoc = null, fbSetDoc = null, fbGetDoc = null, fbOnSnapshot = null, fbCollection = null, fbDeleteDoc = null;
        let db = null; let auth = null; let dbUserId = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.setGameSpeed = function(speed) { if (!isOnlineMode) gameSpeedMultiplier = speed; };
        window.toggleJoystickFromPause = function(enabled) {
            isJoystickEnabled = enabled;
            const jt = document.getElementById('joystickToggle'); const pjt = document.getElementById('pauseJoystickToggle');
            if (jt) jt.checked = enabled; if (pjt) pjt.checked = enabled;
            if (!enabled) resetJoystick(); syncJoystickVisibility();
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        let width = window.innerWidth || 800; let height = window.innerHeight || 600;
        const mouse = { x: width/2, y: height/2 };

        // オブジェクト配列
        let particles = [], floatingTexts = [], bullets = [], enemies = [], gems = [];
        let specialSkills = []; // 特殊武器のエフェクトを一括管理
        
        let player = null;
        let gameSpeedMultiplier = 1.0; let timeAccumulator = 0; const frameTime = 1000 / 60;
        let camera = { x: 0, y: 0 }; const mapSize = 10000;
        let isMuted = false;
        
        // ギャラクシー背景の星
        let bgStars = [];
        function initStars() {
            bgStars = [];
            for(let i=0; i<300; i++) {
                bgStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * 2 + 0.1, // 奥行き用パラメータ
                    color: Math.random() > 0.8 ? '#0ff' : (Math.random() > 0.8 ? '#f0f' : '#fff')
                });
            }
        }

        let isLavaDomainActive = false; let lavaDomainTimer = 0; const LAVA_DOMAIN_MAX_TIME = 45 * 60;

        const upgradeDef = [
            { id: 'hp', name: '初期HPアップ', desc: '開始時の最大HPが20増える', icon: '❤️' },
            { id: 'damage', name: '初期攻撃力アップ', desc: '開始時の弾ダメージが5増える', icon: '⚔️' },
            { id: 'speed', name: '移動速度アップ', desc: '開始時の移動速度が少し上がる', icon: '💨' },
            { id: 'exp', name: '獲得経験値アップ', desc: '経験値の取得量が20%増える', icon: '⭐' }
        ];

        let userData = { score: 0, coins: 0, upgrades: { hp: 0, damage: 0, speed: 0, exp: 0 }, nickname: "" };
        let gameState = 'start'; let frameCount = 0, lastTime = 0, gameTime = 0, score = 0, animationId;
        let isTimeStopped = false, shakeTime = 0, shakeIntensity = 0;
        
        let isJoystickEnabled = true; let joystickData = { dx: 0, dy: 0, active: false, touchId: null };
        const joystickZone = document.getElementById('joystickZone'); const joystickStick = document.getElementById('joystickStick');
        const maxStickDist = 40;

        let isOnlineMode = false; let onlinePlayers = {}; let unsubscribePlayers = null; let syncTimer = 0;

        // ユーティリティ
        const safe = (v, fallback = 0) => (Number.isFinite(v) && !isNaN(v)) ? v : fallback;
        const safeR = (v, fallback = 1) => (Number.isFinite(v) && !isNaN(v) && v >= 1) ? v : fallback;
        const MathUtils = { distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1), angle: (x1, y1, x2, y2) => Math.atan2(y2 - y1, x2 - x1), random: (min, max) => Math.random() * (max - min) + min };
        const distSq = (x1, y1, x2, y2) => (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1);

        function resizeCanvas() {
            width = Math.max(1, window.innerWidth || 800); height = Math.max(1, window.innerHeight || 600);
            canvas.width = width; canvas.height = height; initStars();
        }
        function triggerShake(power = 10) { shakeTime = power; shakeIntensity = power/2; }
        function createParticles(x, y, count = 8, color = '#0ff', size = 3) {
            for (let i = 0; i < count && particles.length < 300; i++) particles.push(new Particle(x, y, color, size));
        }

        function resetJoystick() { joystickData.dx = 0; joystickData.dy = 0; joystickData.active = false; joystickData.touchId = null; if (joystickStick) joystickStick.style.transform = 'translate(0px, 0px)'; }
        function syncJoystickVisibility() { if (!joystickZone) return; const shouldShow = isJoystickEnabled && gameState === 'playing'; joystickZone.classList.toggle('hidden', !shouldShow); if (!shouldShow) resetJoystick(); }
        function updatePointerPosition(clientX, clientY) { mouse.x = clientX; mouse.y = clientY; }
        function updateJoystick(clientX, clientY) {
            if (!joystickZone || !joystickStick) return; const rect = joystickZone.getBoundingClientRect();
            let dx = clientX - (rect.left + rect.width / 2); let dy = clientY - (rect.top + rect.height / 2);
            const dist = Math.hypot(dx, dy); if (dist > maxStickDist) { dx = (dx / dist) * maxStickDist; dy = (dy / dist) * maxStickDist; }
            joystickData.dx = dx / maxStickDist; joystickData.dy = dy / maxStickDist; joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        const Sound = {
            ctx: null, bgmInterval: null,
            init: function() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            playTone: function(freq, type, duration, vol = 0.1) {
                if (isMuted || !this.ctx) return;
                try { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration); } catch(e) {}
            },
            playNoise: function(duration, vol = 0.1) {
                if (isMuted || !this.ctx) return;

                        if (doc.id === dbUserId) return;

                        onlinePlayers[doc.id] = data; activeIds.add(doc.id);

        // ==========================================
        // 汎用スキル・エフェクトクラス (完全復活版)
        // ==========================================
        class BeamSkill {
            constructor(x, y, angle, color, width, duration, damage) {
                this.x = x; this.y = y; this.angle = angle; this.color = color; this.width = width; 
                this.duration = duration; this.maxDuration = duration; this.damage = damage; this.markedForDeletion = false; this.hitTimer = 0;
            }
            update() {
                this.duration--; if(this.duration <= 0) this.markedForDeletion = true;
                this.x = player.x; this.y = player.y; // プレイヤー追従
                this.hitTimer++;
                if(this.hitTimer > 5) {
                    this.hitTimer = 0;
                    for(let enemy of enemies) {
                        if(enemy.markedForDeletion) continue;
                        let dx = enemy.x - this.x; let dy = enemy.y - this.y; let dist = Math.sqrt(dx*dx + dy*dy);
                        let angleToEnemy = Math.atan2(dy, dx); let angleDiff = Math.abs(this.angle - angleToEnemy);
                        if(angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
                        if(dist * Math.sin(angleDiff) < this.width/2 + enemy.radius && Math.cos(angleDiff) > 0) {
                            enemy.takeDamage(this.damage);
                        }
                    }
                }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(safe(this.x), safe(this.y)); ctx.rotate(this.angle);
                ctx.globalAlpha = this.duration / this.maxDuration; ctx.fillStyle = this.color; ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.fillRect(0, -this.width/2, 2000, this.width); ctx.fillStyle = '#fff'; ctx.fillRect(0, -this.width/4, 2000, this.width/2); ctx.restore();
            }
        }

        class AreaSkill {
            constructor(x, y, color, maxRadius, duration, damage, isPull = false) {
                this.x = x; this.y = y; this.color = color; this.radius = 10; this.maxRadius = maxRadius;
                this.duration = duration; this.maxDuration = duration; this.damage = damage; this.isPull = isPull; this.markedForDeletion = false;
            }
            update() {
                this.duration--; if(this.duration <= 0) this.markedForDeletion = true;
                if(this.radius < this.maxRadius) this.radius += (this.maxRadius / 20);
                if(frameCount % 10 === 0) {
                    for(let enemy of enemies) {
                        if(enemy.markedForDeletion) continue;
                        let d = MathUtils.distance(this.x, this.y, enemy.x, enemy.y);
                        if(d < this.radius) {
                            enemy.takeDamage(this.damage);
                            if(this.isPull && d > 10) {
                                let a = MathUtils.angle(enemy.x, enemy.y, this.x, this.y);
                                enemy.x += Math.cos(a) * 5; enemy.y += Math.sin(a) * 5;
                            }
                        }
                    }
                }
            }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = (this.duration / this.maxDuration) * 0.5; ctx.beginPath();
                ctx.arc(safe(this.x), safe(this.y), safeR(this.radius), 0, Math.PI*2); ctx.fillStyle = this.color; ctx.shadowBlur = 20; ctx.shadowColor = this.color; ctx.fill(); ctx.restore();
            }
        }

        class ProjectileSkill {
            constructor(x, y, vx, vy, radius, color, damage, explosionRadius) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.radius = radius; this.color = color; 
                this.damage = damage; this.explosionRadius = explosionRadius; this.markedForDeletion = false; this.life = 120;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life--;
                if(this.life <= 0) this.explode();
                for(let enemy of enemies) {
                    if(MathUtils.distance(this.x, this.y, enemy.x, enemy.y) < this.radius + enemy.radius) { this.explode(); break; }
                }
            }
            explode() {
                this.markedForDeletion = true; triggerShake(10);
                specialSkills.push(new AreaSkill(this.x, this.y, this.color, this.explosionRadius, 20, this.damage, false));
                createParticles(this.x, this.y, 20, this.color, 5);

            draw(ctx) {
                ctx.save(); ctx.beginPath(); ctx.arc(safe(this.x), safe(this.y), safeR(this.radius), 0, Math.PI*2);

        class Bullet {
            constructor(x, y, angle, damage, speed, radius, pierce = 1, color = '#0ff') {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.damage = damage; this.radius = radius; this.pierce = pierce; this.color = color; this.markedForDeletion = false; this.hitEnemies = new Set();

                ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fill(); ctx.restore();
            }
        }

        class ShieldProjectile extends Bullet {
            constructor(x, y, damage, speed) { super(x, y, Math.random()*Math.PI*2, damage, speed, 15, 10, '#3b82f6'); this.bounces = 5; }
            update() {
                super.update(); let nearest = null; let minDist = 400;
                for(let e of enemies) {
                    if(e.markedForDeletion || this.hitEnemies.has(e)) continue;
                    let d = MathUtils.distance(this.x, this.y, e.x, e.y); if(d < minDist) { minDist = d; nearest = e; }
                }
                if(nearest) {
                    let targetAngle = MathUtils.angle(this.x, this.y, nearest.x, nearest.y); let currentAngle = Math.atan2(this.vy, this.vx);
                    let diff = targetAngle - currentAngle; while(diff > Math.PI) diff -= Math.PI*2; while(diff < -Math.PI) diff += Math.PI*2;

                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let target = enemies[j]; if (target.markedForDeletion || this.hitEnemies.has(target)) continue;
                    if (distSq(this.x, this.y, target.x, target.y) < (this.radius + target.radius)**2) {
                        target.takeDamage(this.damage); this.hitEnemies.add(target); this.bounces--; createParticles(this.x, this.y, 5, this.color, 2);
                        if (this.bounces <= 0) { this.markedForDeletion = true; break; }
                    }
                }
            }
        }

        class Particle {
            constructor(x, y, color, size) {
                this.x = x; this.y = y; this.color = color; this.radius = MathUtils.random(1, size);

            update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.9; this.vy *= 0.9; this.life -= this.decay; if (this.life <= 0) this.markedForDeletion = true; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.beginPath(); ctx.arc(safe(this.x), safe(this.y), safeR(this.radius), 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
        }

        class FloatingText {
            constructor(x, y, text, color, size) { this.x = x + MathUtils.random(-10, 10); this.y = y; this.text = text; this.color = color; this.size = size; this.vy = -1.5; this.life = 1.0; this.markedForDeletion = false; }
            update() { this.y += this.vy; this.life -= 0.02; if (this.life <= 0) this.markedForDeletion = true; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.font = `bold ${this.size}px 'Orbitron', sans-serif`; ctx.fillStyle = this.color; ctx.textAlign = 'center'; ctx.shadowBlur = 3; ctx.shadowColor = '#000'; ctx.fillText(this.text, safe(this.x), safe(this.y)); ctx.restore(); }
        }

        class Gem {
            constructor(x, y, value) {
                this.x = x; this.y = y; this.value = value;
                if(value >= 50) { this.radius = 12; this.color = '#ff0000'; } else if(value >= 20) { this.radius = 9; this.color = '#ff8800'; } else if(value >= 5) { this.radius = 6; this.color = '#f0f'; } else if(value >= 2) { this.radius = 4; this.color = '#0f0'; } else { this.radius = 3; this.color = '#ff0'; }

        }

        class Player {

                this.x = x; this.y = y; this.faceAngle = 0; this.radius = 15; this.color = '#0ff';

                // スキルレベル

                this.invincibleTimer = 60; this.regenTimer = 0; this.regenAmount = 1; this.regenRate = 60; this.recoveryMasteryLevel = 0;

                        if (inputMag > 0) { this.faceAngle = Math.atan2(joystickData.dy/inputMag, joystickData.dx/inputMag); let speedMult = Math.min(1.0, inputMag * 2.0); this.x += (joystickData.dx/inputMag) * this.speed * speedMult; this.y += (joystickData.dy/inputMag) * this.speed * speedMult; }

                    if (this.funnelLevel > 0 && frameCount % 60 === 0) { let t = enemies[MathUtils.randomInt(0, enemies.length-1)]; if(t) specialSkills.push(new ProjectileSkill(this.x, this.y, Math.cos(this.faceAngle)*15, Math.sin(this.faceAngle)*15, 8, '#22c55e', 200*this.funnelLevel, 100)); }
                    if (this.thorLevel > 0 && frameCount % 400 === 0) { specialSkills.push(new ProjectileSkill(this.x, this.y, Math.cos(this.faceAngle)*25, Math.sin(this.faceAngle)*25, 20, '#06b6d4', 800*this.thorLevel, 250)); }
                    if (this.disneyMagicLevel > 0 && frameCount % 500 === 0) { specialSkills.push(new AreaSkill(this.x, this.y, '#fbcfe8', 400, 30, 50*this.disneyMagicLevel, false)); }

                    if (this.hollowMurasakiLevel > 0 && frameCount % 600 === 0) { specialSkills.push(new ProjectileSkill(this.x, this.y, Math.cos(this.faceAngle)*10, Math.sin(this.faceAngle)*10, 50+this.hollowMurasakiLevel*20, '#a855f7', 2000*this.hollowMurasakiLevel, 300)); triggerPurpleCutin(); }
                    if (this.kamehamehaLevel > 0 && frameCount % 600 === 0) { specialSkills.push(new BeamSkill(this.x, this.y, this.faceAngle, '#60a5fa', 100+this.kamehamehaLevel*50, 120, 50*this.kamehamehaLevel)); triggerKamehamehaCutin(); }
                    if (this.infinitySnapLevel > 0 && frameCount % 1200 === 0) { triggerSnapCutin(); triggerShake(50); enemies.forEach(e => { if(Math.random()<0.5) e.takeDamage(e.hp*0.5); }); }
                    if (this.infiniteBladeLevel > 0 && frameCount % 600 === 0) { for(let i=0; i<20+this.infiniteBladeLevel*10; i++) setTimeout(()=> { let a = Math.random()*Math.PI*2; bullets.push(new Bullet(this.x, this.y, a, 500, 25, 10, 5, '#facc15')); }, i*50); triggerBladeCutin(); }
                    if (this.keraunosLevel > 0 && frameCount % 800 === 0) { triggerLightningCutin(); for(let i=0; i<15+this.keraunosLevel*5; i++) setTimeout(()=> { let rx=camera.x+Math.random()*width; let ry=camera.y+Math.random()*height; specialSkills.push(new AreaSkill(rx, ry, '#06b6d4', 150, 30, 500, false)); triggerShake(10); }, i*100); }
                }
            }

            shoot() {
                let nearestEnemy = null; let minDist = this.attackRange;
                for (const enemy of enemies) {
                    if (enemy.markedForDeletion) continue; 
                    const dist = MathUtils.distance(this.x, this.y, enemy.x, enemy.y);
                    if (dist < minDist) { minDist = dist; nearestEnemy = enemy; }
                }
                if (nearestEnemy) {
                    this.fireTimer = 0; const angle = MathUtils.angle(this.x, this.y, nearestEnemy.x, nearestEnemy.y);
                    bullets.push(new Bullet(this.x, this.y, angle, this.damage, this.bulletSpeed, this.bulletSize, this.pierce));
                    createParticles(this.x + Math.cos(angle)*this.radius, this.y + Math.sin(angle)*this.radius, 3, this.color, 2); Sound.shoot();

            draw(ctx) {
                ctx.save(); let px = safe(this.x), py = safe(this.y);
                if (this.aegisShieldLevel > 0) {
                    ctx.globalCompositeOperation = 'screen'; let r = this.radius + 15 + Math.sin(Date.now() / 200) * 3; ctx.beginPath();
                    for(let i=0; i<6; i++) { let a = (Math.PI / 3) * i + (Date.now() / 1000); let x = px + Math.cos(a) * r; let y = py + Math.sin(a) * r; if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
                    ctx.closePath(); ctx.fillStyle = 'rgba(0, 229, 255, 0.15)'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#00e5ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00e5ff'; ctx.stroke();
                    ctx.globalCompositeOperation = 'source-over';
                }

                if (this.trail.length > 1) {
                    ctx.globalCompositeOperation = 'screen';
                    for (let i = 0; i < this.trail.length - 1; i++) {
                        let p1 = this.trail[i]; let p2 = this.trail[i + 1]; let progress = (i + 1) / this.trail.length; let baseColor = this.invincibleTimer > 0 ? '250, 204, 21' : '6, 182, 212';
                        ctx.beginPath(); ctx.moveTo(safe(p1.x), safe(p1.y)); ctx.lineTo(safe(p2.x), safe(p2.y)); ctx.strokeStyle = `rgba(${baseColor}, ${progress * 0.8})`; ctx.lineWidth = safeR(this.radius * 1.2 * progress); ctx.lineCap = 'round'; ctx.shadowBlur = safeR(10 * progress); ctx.shadowColor = `rgb(${baseColor})`; ctx.stroke();
                    }
                    ctx.globalCompositeOperation = 'source-over';
                }

                ctx.beginPath(); ctx.arc(px, py, safeR(this.radius), 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.stroke();
                ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();

                if (this.bladeRingLevel > 0) {
                    let count = this.bladeRingLevel * 2; let dist = 60 + (this.bladeRingLevel * 5); let br = 8 + (this.bladeRingLevel * 2);
                    ctx.fillStyle = '#f0f'; ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
                    for (let i = 0; i < count; i++) { let angle = this.bladeRingAngle + (Math.PI * 2 / count) * i; ctx.beginPath(); ctx.arc(safe(px + Math.cos(angle) * dist), safe(py + Math.sin(angle) * dist), safeR(br), 0, Math.PI * 2); ctx.fill(); }
                    
                    // 刃の当たり判定
                    if(frameCount % 5 === 0) {
                        for (let enemy of enemies) {
                            if(enemy.markedForDeletion) continue;
                            if (MathUtils.distance(px, py, enemy.x, enemy.y) < dist + enemy.radius + br) enemy.takeDamage(this.damage * 2);
                        }
                    }
                }
                ctx.restore();
            }

            gainExp(amount) { this.exp += amount * this.expBoost; while (this.exp >= this.expToNext) { this.exp -= this.expToNext; this.pendingLevelUps++; let nextLvl = this.level + this.pendingLevelUps; if (nextLvl > 15) this.expToNext = Math.floor(this.expToNext * 1.3); else if (nextLvl >= 10) this.expToNext = Math.floor(this.expToNext * 1.15); else this.expToNext = Math.floor(this.expToNext * 1.5); } updateUI(); }
            processLevelUp() { Sound.levelUp(); this.level++; createParticles(this.x, this.y, 50, '#ff0', 5); floatingTexts.push(new FloatingText(this.x, this.y - 30, "LEVEL UP!", '#ff0', 20)); if (!isOnlineMode) { if (this.level > 0 && this.level % 10 === 0) { this.pendingMonkeyBoss = true; } else if (this.level > 3) { if (this.level % 3 === 0) this.pendingBossSpawn = true; else this.pendingMidBossSpawn = true; } } triggerLevelUpScreen(); }
            takeDamage(amount) {
                if (this.invincibleTimer > 0) return; if (!Number.isFinite(amount) || isNaN(amount) || amount <= 0) return; 
                if (this.aegisShieldLevel > 0) { let cutRate = 0.3 + (this.aegisShieldLevel - 1) * 0.1; if (cutRate > 0.9) cutRate = 0.9; amount *= (1 - cutRate); }
                this.hp -= amount; this.invincibleTimer = 90; updateUI(); triggerShake(15); createParticles(this.x, this.y, 10, '#f00', 4); Sound.hit();
                if (this.hp <= 0) gameOver();

        class Enemy {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type; this.markedForDeletion = false; this.invincibleTimer = 0; 
                this.isBoss = false; this.isMidBoss = false; this.isMonkey = false; this.isCharmed = false; 
                const timeMultiplier = 1 + (gameTime / 60); 

                switch(type) {
                    case 0: this.radius = 12; this.color = '#f05'; this.speed = MathUtils.random(1.5, 2.0); this.hp = 20 * timeMultiplier; this.damage = 10; this.expValue = 1; break;
                    case 1: this.radius = 8; this.color = '#f90'; this.speed = MathUtils.random(2.5, 3.5); this.hp = 10 * timeMultiplier; this.damage = 5; this.expValue = 2; break;
                    case 2: this.radius = 20; this.color = '#c0f'; this.speed = MathUtils.random(0.5, 1.0); this.hp = 80 * timeMultiplier; this.damage = 25; this.expValue = 5; break;
                    case 3: this.radius = 45; this.color = '#ff0044'; this.speed = 1.2; this.hp = 1500 * Math.max(1, Math.floor(player.level / 3)); this.damage = 40; this.expValue = 25; this.isBoss = true; break;
                    case 4: this.radius = 30; this.color = '#ff6600'; this.speed = 1.4; this.hp = 250 * Math.max(1, player.level); this.damage = 30; this.expValue = 15; this.isMidBoss = true; break;
                    case 7: this.radius = 60; this.color = '#8B4513'; this.speed = 1.8; this.hp = 5000 * Math.max(1, Math.floor(player.level / 5)); this.damage = 100; this.expValue = 100; this.isMonkey = true; this.clubAngle = 0; break;
                    default: this.radius = 10; this.color = '#fff'; this.speed = 1; this.hp = 10; this.damage = 5; this.expValue = 1; break;
                }
                this.maxHp = this.hp;
            }

            update() {
                if (this.invincibleTimer > 0) this.invincibleTimer--;
                const angle = MathUtils.angle(this.x, this.y, player.x, player.y);
                this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
                if (this.type === 7) this.clubAngle += 0.15;
            }

            draw(ctx) {
                ctx.save(); ctx.beginPath(); let px = safe(this.x), py = safe(this.y), r = safeR(this.radius);
                if (this.type === 0) { ctx.rect(px - r, py - r, r*2, r*2); } else if (this.type === 1) { ctx.moveTo(px + r, py); ctx.lineTo(px + Math.cos(2.09)*r, py + Math.sin(2.09)*r); ctx.lineTo(px + Math.cos(4.18)*r, py + Math.sin(4.18)*r); ctx.closePath(); } else if (this.type === 2) { for (let i = 0; i < 8; i++) ctx.lineTo(px + Math.cos((Math.PI/4)*i)*r, py + Math.sin((Math.PI/4)*i)*r); ctx.closePath(); } else { ctx.arc(px, py, r, 0, Math.PI * 2); }
                ctx.lineWidth = 2; ctx.strokeStyle = this.color; ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fill(); ctx.stroke(); ctx.restore();
            }

            takeDamage(amount) {
                if (this.markedForDeletion) return; this.hp -= amount; createParticles(this.x, this.y, 3, this.color, 2);
                if(floatingTexts.length < 100) floatingTexts.push(new FloatingText(this.x, this.y, Math.floor(amount), '#fff', 14));
                if (this.hp <= 0) this.die();
            }

            die() {
                if (this.markedForDeletion) return; this.markedForDeletion = true; score += this.maxHp; Sound.enemyDie();
                createParticles(this.x, this.y, 3, this.color, 4); if(gems.length < 300) gems.push(new Gem(this.x, this.y, this.expValue));
                document.getElementById('scoreDisplay').innerText = Math.floor(score);
            }
        }

            let shuffled = pool.sort(() => 0.5 - Math.random()); while (selected.length < 3 && shuffled.length > 0) selected.push(shuffled.shift());

            selected.sort(() => 0.5 - Math.random()).forEach(upgrade => {
                const card = document.createElement('div'); card.className = 'upgrade-card p-6 rounded-lg w-64 text-center cursor-pointer flex flex-col items-center justify-between pointer-events-auto';
                card.innerHTML = `<div class="text-5xl mb-3">${upgrade.icon}</div><h3 class="text-xl font-bold mb-2" style="color: ${upgrade.color}">${upgrade.name}</h3><p class="text-sm text-gray-300 leading-relaxed font-bold">${upgrade.desc}</p>`;
                card.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); upgrade.apply(); floatingTexts.push(new FloatingText(player.x, player.y, upgrade.name, upgrade.color, 16)); closeLevelUpScreen(); });
                container.appendChild(card);
            });
            showScreen('levelUpScreen');
        }

        function closeLevelUpScreen() { showScreen(null); gameState = 'playing'; lastTime = performance.now(); isTimeStopped = false; if (animationId) cancelAnimationFrame(animationId); animationId = requestAnimationFrame(gameLoop); }

        function showCustomCutin(title, sub, color) { const cutin = document.getElementById('generalCutin'); const bg = document.getElementById('cutinBg'); document.getElementById('cutinTitle').innerText = title; document.getElementById('cutinSub').innerText = sub; document.getElementById('cutinSub').style.color = color; cutin.classList.remove('hidden'); cutin.classList.remove('opacity-0'); bg.style.animation = 'none'; bg.offsetHeight; bg.style.animation = null; setTimeout(() => { cutin.classList.add('opacity-0'); setTimeout(() => cutin.classList.add('hidden'), 500); }, 3000); }
        function triggerPurpleCutin() { showCustomCutin("虚式", "茈", "#a855f7"); } function triggerKamehamehaCutin() { showCustomCutin("龍星", "崩 命 破", "#3b82f6"); } function triggerBladeCutin() { showCustomCutin("王の財宝", "Gate of Babylon", "#facc15"); } function triggerIronCutin() { showCustomCutin("機神", "創世の光芒", "#ef4444"); } function triggerLightningCutin() { showCustomCutin("天帝の裁界", "霹 靂", "#06b6d4"); } function triggerFunnelCutin() { showCustomCutin("星砕き", "流 星 群", "#22c55e"); } function triggerVaderCutin() { showCustomCutin("深淵の重力刃", "DARK LORD", "#dc2626"); } function triggerThorCutin() { showCustomCutin("雷霆砕破", "轟", "#06b6d4"); } function triggerDisneyCutin() { showCustomCutin("星夢の", "輪 舞 曲", "#ec4899"); } function triggerMuryokuCutin() { showCustomCutin("領域展開", "無 量 空 処", "#e2e8f0"); } function triggerSnapCutin() { showCustomCutin("神威", "終焉の指弾", "#facc15"); }
        function triggerMonkeyDomain() { Sound.bossSpawn(); showCustomCutin("領域展開", "焦熱溶岩海", '#ff4500'); setTimeout(() => { isLavaDomainActive = true; lavaDomainTimer = LAVA_DOMAIN_MAX_TIME; document.getElementById('lavaOverlay').classList.add('active'); document.getElementById('domainTimerContainer').classList.remove('hidden'); triggerShake(30); floatingTexts.push(new FloatingText(player.x, player.y - 100, "最強武器 封印！", '#ff0000', 50)); }, 3000); }
        function triggerDomainCollapse() { if (!isLavaDomainActive) return; isLavaDomainActive = false; lavaDomainTimer = 0; document.getElementById('lavaOverlay').classList.remove('active'); document.getElementById('domainTimerContainer').classList.add('hidden'); const shatter = document.getElementById('shatterEffect'); shatter.classList.remove('hidden'); shatter.style.animation = 'none'; shatter.offsetHeight; shatter.style.animation = null; Sound.playNoise(1.5, 0.5); triggerShake(50); floatingTexts.push(new FloatingText(player.x, player.y - 100, "領域崩壊 - 封印解除", '#0ff', 50)); setTimeout(() => { shatter.classList.add('hidden'); }, 1500); }

        function updateLogic() {
            if (!player) return; 
            if (!isTimeStopped) {
                gameTime += 1 / 60; frameCount++;
                if (frameCount % 60 === 0) document.getElementById('timeDisplay').innerText = `${Math.floor(gameTime / 60).toString().padStart(2, '0')}:${Math.floor(gameTime % 60).toString().padStart(2, '0')}`;
                let spawnInterval = Math.max(10, 80 - Math.floor(gameTime)); if (frameCount % spawnInterval === 0 && enemies.length < 200) spawnEnemy();
                if (isOnlineMode) { syncTimer++; if (syncTimer > 6) { uploadPlayerState(); syncTimer = 0; } }
            }
            if (shakeTime > 0) shakeTime--;

            if (!isTimeStopped) {
                const groups = [ {a:gems, l:300}, {a:particles, l:400}, {a:bullets, l:200}, {a:floatingTexts, l:150}, {a:specialSkills, l:50} ];
                for (let g of groups) {
                    if (g.a.length > g.l) g.a.splice(0, g.a.length - g.l);
                    for (let i = g.a.length - 1; i >= 0; i--) { try { g.a[i].update(); } catch(e) { g.a[i].markedForDeletion = true; } if (g.a[i].markedForDeletion) g.a.splice(i, 1); }
                }
                
                try { player.update(); } catch(e) {}
                
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let bullet = bullets[i];
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let target = enemies[j]; if (target.markedForDeletion) continue;
                        if (!bullet.hitEnemies.has(target)) {
                            if (distSq(bullet.x, bullet.y, target.x, target.y) < (bullet.radius + target.radius)**2) {
                                target.takeDamage(bullet.damage); bullet.hitEnemies.add(target); bullet.pierce--; 
                                createParticles(bullet.x, bullet.y, 5, '#0ff', 2); if (bullet.pierce <= 0) { bullet.markedForDeletion = true; break; }
                            }
                        }
                    }
                }
                
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i]; if (enemy.markedForDeletion) continue; 
                    try { enemy.update(); } catch(e) {}
                    
                    if (distSq(player.x, player.y, enemy.x, enemy.y) < (player.radius + enemy.radius)**2) {
                        player.takeDamage(enemy.damage); enemy.invincibleTimer = 30;
                    }

                    for (let j = i - 1; j >= 0; j--) {
                        let other = enemies[j]; if (other.markedForDeletion) continue;
                        let minDist = enemy.radius + other.radius; let dSq = distSq(enemy.x, enemy.y, other.x, other.y);
                        if (dSq < minDist * minDist && dSq > 0) {
                            let dist = Math.sqrt(dSq); let overlap = minDist - dist; let angle = MathUtils.angle(other.x, other.y, enemy.x, enemy.y);
                            enemy.x += Math.cos(angle) * (overlap * 0.5); enemy.y += Math.sin(angle) * (overlap * 0.5); 
                            other.x -= Math.cos(angle) * (overlap * 0.5); other.y -= Math.sin(angle) * (overlap * 0.5); 
                        }
                    }
                }
                for (let i = enemies.length - 1; i >= 0; i--) if (enemies[i].markedForDeletion) enemies.splice(i, 1);
            } else {
                if (isJoystickEnabled && joystickData.active && player) {
                    let inputMag = Math.hypot(joystickData.dx, joystickData.dy);
                    if (inputMag > 0) player.faceAngle = Math.atan2(joystickData.dy / inputMag, joystickData.dx / inputMag);
                }
            }
        }

        function drawOtherPlayers(ctx, w, h) {
            if (!isOnlineMode) return;
            for (let id in onlinePlayers) {
                let op = onlinePlayers[id]; let px = safe(op.x); let py = safe(op.y);
                let onScreen = (px > camera.x - 50 && px < camera.x + w + 50 && py > camera.y - 50 && py < camera.y + h + 50);
                if (onScreen) {
                    ctx.save();
                    if (op.hasAegis) {
                        ctx.globalCompositeOperation = 'screen'; let r = 30 + Math.sin(Date.now() / 200) * 3; ctx.beginPath();
                        for(let i=0; i<6; i++) { let a = (Math.PI / 3) * i + (Date.now() / 1000); let hx = px + Math.cos(a) * r; let hy = py + Math.sin(a) * r; if(i===0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy); }
                        ctx.closePath(); ctx.fillStyle = 'rgba(0, 229, 255, 0.15)'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#00e5ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00e5ff'; ctx.stroke(); ctx.globalCompositeOperation = 'source-over';
                    }
                    ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#f43f5e'; ctx.shadowBlur = 15; ctx.shadowColor = '#f43f5e'; ctx.stroke();
                    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
                    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px Orbitron'; ctx.textAlign = 'center'; ctx.fillText(op.name, px, py - 30);
                    let hpPercent = Math.max(0, op.hp / op.maxHp); ctx.fillStyle = '#555'; ctx.fillRect(px - 20, py - 25, 40, 4); ctx.fillStyle = '#0f0'; ctx.fillRect(px - 20, py - 25, 40 * hpPercent, 4); ctx.restore();
                } else {
                    ctx.save(); let dx = px - (camera.x + w/2); let dy = py - (camera.y + h/2); let angle = Math.atan2(dy, dx);
                    let margin = 40; let ex = Math.max(margin, Math.min(w - margin, w/2 + Math.cos(angle) * (w/2 - margin))); let ey = Math.max(margin, Math.min(h - margin, h/2 + Math.sin(angle) * (h/2 - margin)));
                    ctx.translate(ex + camera.x, ey + camera.y);
                    ctx.shadowBlur = 2; ctx.shadowColor = '#000'; ctx.fillStyle = '#f43f5e'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(op.name, 0, -20);
                    ctx.rotate(angle); ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-10, -10); ctx.closePath(); ctx.fillStyle = '#f43f5e'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke(); ctx.restore();
                }
            }
        }

        function drawAll() {
            ctx.setTransform(1, 0, 0, 1, 0, 0); let w = safe(width, 800); let h = safe(height, 600);
            
            // 背景クリアと星の描画（パララックス）
            ctx.fillStyle = '#020010'; ctx.fillRect(0, 0, w, h);
            camera.x = player ? player.x - w / 2 : 0; camera.y = player ? player.y - h / 2 : 0;

            for(let star of bgStars) {
                let sx = (star.x - camera.x * star.z) % w; if(sx < 0) sx += w;
                let sy = (star.y - camera.y * star.z) % h; if(sy < 0) sy += h;
                ctx.fillStyle = star.color; ctx.globalAlpha = Math.min(1, star.z * 0.8);
                ctx.beginPath(); ctx.arc(sx, sy, star.z * 1.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            ctx.save();
            if (shakeTime > 0) ctx.translate(MathUtils.random(-shakeIntensity, shakeIntensity), MathUtils.random(-shakeIntensity, shakeIntensity));
            ctx.translate(-camera.x, -camera.y);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 2; const gridSize = 400; 
            const startX = Math.floor(camera.x / gridSize) * gridSize; const startY = Math.floor(camera.y / gridSize) * gridSize;
            ctx.beginPath();
            for (let x = startX; x <= camera.x + w + gridSize; x += gridSize) { ctx.moveTo(safe(x), safe(camera.y - gridSize)); ctx.lineTo(safe(x), safe(camera.y + h + gridSize)); }
            for (let y = startY; y <= camera.y + h + gridSize; y += gridSize) { ctx.moveTo(safe(camera.x - gridSize), safe(y)); ctx.lineTo(safe(camera.x + w + gridSize), safe(y)); }
            ctx.stroke();

            const drawGroups = [ specialSkills, gems, bullets, enemies ];
            for (let group of drawGroups) { for (let obj of group) { try { obj.draw(ctx); } catch(e) {} } }
            
            drawOtherPlayers(ctx, w, h);
            if(player) { try { player.draw(ctx); } catch(e) {} }
            
            ctx.globalCompositeOperation = 'lighter'; for (let p of particles) { try { p.draw(ctx); } catch(e) {} }
            ctx.globalCompositeOperation = 'source-over'; for (let ft of floatingTexts) { try { ft.draw(ctx); } catch(e) {} }
            ctx.restore(); 
        }

        function gameLoop(currentTime) {
            if (gameState !== 'playing') return; 
            let deltaTime = currentTime - lastTime; lastTime = currentTime; if (deltaTime > 100) deltaTime = 100; 
            timeAccumulator += deltaTime * gameSpeedMultiplier; let steps = 0;
            while (timeAccumulator >= frameTime) { try { updateLogic(); } catch(e) {} timeAccumulator -= frameTime; steps++; if (steps > 5) { timeAccumulator = 0; break; } }
            try { drawAll(); } catch(e) {}
            try { if (player && player.pendingLevelUps > 0 && gameState === 'playing') { player.pendingLevelUps--; player.processLevelUp(); } } catch (e) {}
            if (gameState === 'playing') animationId = requestAnimationFrame(gameLoop);
        }

        function checkNickname() {
            const nickInput = document.getElementById('nicknameInput');
            if (!nickInput || !nickInput.value.trim()) { alert("ニックネームを入力してください。"); nickInput?.focus(); return false; }
            userData.nickname = nickInput.value.trim(); saveData(); return true;
        }

        async function initGame(online = false) {
            if (!checkNickname()) return; isOnlineMode = online;
            if (isOnlineMode) { const joined = await joinOnlineMode(); if (!joined) return; } else leaveOnlineMode();

            showScreen('uiLayer'); gameState = 'playing';
            const jt = document.getElementById('joystickToggle'); if (jt) isJoystickEnabled = jt.checked; const pjt = document.getElementById('pauseJoystickToggle'); if (pjt) pjt.checked = isJoystickEnabled;
            syncJoystickVisibility();

            player = new Player(width / 2, height / 2);
            particles = []; floatingTexts = []; bullets = []; enemies = []; gems = []; specialSkills = [];
            
            frameCount = 0; gameTime = 0; score = 0; isTimeStopped = false; timeAccumulator = 0; gameSpeedMultiplier = 1.0;
            const speedRadios = document.getElementsByName('gameSpeed'); for(let r of speedRadios) { if(r.value === "1.0") r.checked = true; }
            
            updateUI(); Sound.init(); Sound.startBGM(); lastTime = performance.now(); if (animationId) cancelAnimationFrame(animationId); animationId = requestAnimationFrame(gameLoop);
        }

        // ==========================================
        // イベントリスナー
        // ==========================================
        document.getElementById('openUpgradeBtn').addEventListener('click', () => { renderUpgradeScreen(); showScreen('upgradeScreen'); });
        document.getElementById('closeUpgradeBtn').addEventListener('click', () => { showScreen('startScreen'); });
        document.getElementById('pauseMuteBtn').addEventListener('click', (e) => { isMuted = !isMuted; e.target.innerText = isMuted ? '🔇 SOUND: OFF' : '🔊 SOUND: ON'; if (isMuted) Sound.stopBGM(); else if (gameState === 'playing' || gameState === 'paused') Sound.startBGM(); });

        document.getElementById('startBtn').addEventListener('click', () => { if (gameState === 'start' || gameState === 'gameover') initGame(false); });
        document.getElementById('onlineStartBtn').addEventListener('click', () => { if (gameState === 'start' || gameState === 'gameover') initGame(true); });
        document.getElementById('restartBtn').addEventListener('click', () => { gameState = 'start'; syncJoystickVisibility(); showScreen('startScreen'); loadData(); });
        document.getElementById('quitToTitleBtn').addEventListener('click', quitToTitle);
        
        const pauseAction = () => {
            if (gameState === 'playing') { gameState = 'paused'; syncJoystickVisibility(); showScreen('pauseScreen'); Sound.stopBGM(); } 
            else if (gameState === 'paused') { gameState = 'playing'; showScreen('uiLayer'); syncJoystickVisibility(); lastTime = performance.now(); Sound.startBGM(); if (animationId) cancelAnimationFrame(animationId); animationId = requestAnimationFrame(gameLoop); }
        };

        document.getElementById('pauseBtn').addEventListener('click', pauseAction);
        document.getElementById('resumeBtn').addEventListener('click', pauseAction);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && (gameState === 'playing' || gameState === 'paused') && !isTimeStopped) pauseAction(); });
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => updatePointerPosition(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { if (e.touches && e.touches.length > 0) updatePointerPosition(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });

        joystickZone.addEventListener('pointerdown', (e) => { if (!isJoystickEnabled || gameState !== 'playing') return; e.preventDefault(); joystickData.active = true; joystickData.touchId = e.pointerId; joystickZone.setPointerCapture?.(e.pointerId); updateJoystick(e.clientX, e.clientY); });
        window.addEventListener('pointermove', (e) => { updatePointerPosition(e.clientX, e.clientY); if (!joystickData.active || joystickData.touchId !== e.pointerId) return; e.preventDefault(); updateJoystick(e.clientX, e.clientY); }, { passive: false });
        const endJoystickPointer = (e) => { if (joystickData.touchId === e.pointerId) resetJoystick(); }; window.addEventListener('pointerup', endJoystickPointer); window.addEventListener('pointercancel', endJoystickPointer);

        document.getElementById('exportBtn').addEventListener('click', () => { saveData(); try { const code = btoa(unescape(encodeURIComponent(JSON.stringify(userData)))); navigator.clipboard?.writeText(code).catch(() => {}); alert('セーブコードをコピーしました。\n\n' + code); } catch (e) { alert('セーブコードの発行に失敗しました。'); } });
        document.getElementById('importBtn').addEventListener('click', () => { const code = prompt('セーブコードを入力してください'); if (!code) return; try { const parsed = JSON.parse(decodeURIComponent(escape(atob(code.trim())))); if (!parsed || typeof parsed !== 'object' || !parsed.upgrades) throw new Error('invalid'); userData = { score: Number(parsed.score || 0), coins: Number(parsed.coins || 0), upgrades: { hp: Number(parsed.upgrades.hp || 0), damage: Number(parsed.upgrades.damage || 0), speed: Number(parsed.upgrades.speed || 0), exp: Number(parsed.upgrades.exp || 0) }, nickname: parsed.nickname || "" }; saveData(); renderUpgradeScreen(); alert('セーブデータを復元しました。'); } catch (e) { alert('コードが正しくありません。'); } });

        resizeCanvas(); loadData(); syncJoystickVisibility(); showScreen('startScreen');
    </script>
